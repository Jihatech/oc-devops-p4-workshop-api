apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-organizer-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-organizer-app
  template:
    metadata:
      labels:
        app: workshop-organizer-app
    spec:
      # PostgreSQL doit être joignable avant de démarrer Spring Boot
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z workshop-organizer-db-service 5432; do echo "attente PostgreSQL..."; sleep 2; done']
      containers:
      - name: workshop-organizer-app
        image: ghcr.io/jihatech/oc-devops-p4-workshop-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          # Hôte = nom du Service PostgreSQL (workshop-organizer-db-service)
          value: jdbc:postgresql://workshop-organizer-db-service:5432/workshop-organizer-database
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: workshop-organizer-db-secret
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: workshop-organizer-db-secret
              key: password
      # L'image GHCR est PUBLIQUE : imagePullSecrets est donc optionnel.
      # On le conserve pour illustrer l'accès à un registre privé
      # (secret créé via `kubectl create secret docker-registry ghcr-pull-secret ...`).
      imagePullSecrets:
      - name: ghcr-pull-secret
