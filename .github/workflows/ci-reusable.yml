# Workflow RÉUTILISABLE (équivalent du template .gitlab-ci.yml réutilisable).
# Il est volontairement IDENTIQUE dans les deux dépôts P4 : c'est la partie factorisée.
# Il s'adapte tout seul au projet appelant grâce à la détection Java/Angular.
name: CI réutilisable

on:
  workflow_call:
    inputs:
      image_name:
        description: "Nom de l'image Docker (sans le registre ni l'owner)"
        required: true
        type: string
      node_version:
        description: "Version de Node.js pour les projets Angular"
        required: false
        type: string
        default: "20"
      java_version:
        description: "Version du JDK pour les projets Java"
        required: false
        type: string
        default: "21"

jobs:
  # ---------------------------------------------------------------- TEST ----
  test:
    runs-on: ubuntu-latest
    outputs:
      project_type: ${{ steps.detect.outputs.type }}
    steps:
      - uses: actions/checkout@v4

      - name: Détection du type de projet
        id: detect
        run: |
          if [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "type=java" >> "$GITHUB_OUTPUT"
          elif [ -f angular.json ]; then
            echo "type=angular" >> "$GITHUB_OUTPUT"
          else
            echo "type=unknown" >> "$GITHUB_OUTPUT"
          fi

      # -- Cache des dépendances : npm (setup-node) OU Gradle (setup-gradle) --
      - name: Setup Node.js + cache npm
        if: steps.detect.outputs.type == 'angular'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Setup JDK Temurin
        if: steps.detect.outputs.type == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: Setup Gradle + cache
        if: steps.detect.outputs.type == 'java'
        uses: gradle/actions/setup-gradle@v4

      - name: Exécuter le script de tests unifié
        run: |
          chmod +x run-tests.sh
          ./run-tests.sh

      - name: Publier le rapport JUnit dans le pipeline
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "test-results/*.xml"
          check_name: "Rapport de tests (${{ steps.detect.outputs.type }})"

      - name: Uploader le rapport JUnit en artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-results/
          if-no-files-found: warn

  # --------------------------------------------------------------- BUILD ----
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcul des références d'image (tag = branche-sha court)
        id: meta
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "image=ghcr.io/${OWNER,,}/${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"
          BRANCH="${GITHUB_REF_NAME//\//-}"
          echo "tag=${BRANCH}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build et push de l'image sur GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------- RELEASE ----
  # Déclenchement AUTOMATIQUE uniquement sur push vers main (choix documenté
  # dans le README). semantic-release calcule la version depuis les
  # conventional commits, crée la release GitHub + changelog, synchronise la
  # version dans les fichiers projet et tague l'image Docker avec cette version.
  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # créer les releases + pousser le bump de version
      packages: write # pousser l'image taguée en version sémantique
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer la chaîne semantic-release (versions épinglées)
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            @semantic-release/github@11 \
            @semantic-release/exec@7

      - name: Exécuter semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          OWNER="${{ github.repository_owner }}"
          export OWNER_LC="${OWNER,,}"
          npx semantic-release
