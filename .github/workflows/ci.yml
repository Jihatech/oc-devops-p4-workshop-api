# Workflow APPELANT (identique dans les deux dépôts).
# Déclenché sur push et pull_request, il délègue tout le pipeline au workflow
# réutilisable ci-reusable.yml en lui passant le nom de l'image (= nom du dépôt).
name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    with:
      image_name: ${{ github.event.repository.name }}
    secrets: inherit
